<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<img src="{{ src }}" alt="Моя Еко Аптека logo" style="display:block; width:100%; height:auto;" />
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:110},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;color&quot;,&quot;reverse&quot;,&quot;mono&quot;,&quot;mono-rev&quot;],&quot;default&quot;:&quot;color&quot;,&quot;tsType&quot;:&quot;'color' | 'reverse' | 'mono' | 'mono-rev'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const mode = this.props.mode || 'color';
    const map = {
      color: 'pharm-logo.svg',        // full colour, badge-less — light surfaces
      reverse: 'pharm-logo-badge.svg',// white-pill badge — dark/coloured surfaces
      mono: 'logo-mono.svg',          // single-colour ink positive
      'mono-rev': 'logo-mono-rev.svg' // single-colour cream reverse
    };
    return { src: map[mode] || map.color };
  }
}
</script>
</body>
</html>
